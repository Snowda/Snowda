name: Update README stats

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use your admin PAT so the commit-back push bypasses branch
          # protection on main (the github-actions[bot] cannot be granted
          # a bypass; an admin user can).
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate overall stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Snowda&show_icons=true&count_private=true&theme=algolia&line_height=27
          path: profile/stats.svg
          # Add a repo-scoped PAT as the GH_STATS_TOKEN secret to include
          # private contributions; otherwise public stats via GITHUB_TOKEN.
          token: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=Snowda&hide=css,html&count_private=true&theme=algolia
          path: profile/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats cards" || exit 0
          git push
